<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Для тебя ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Фон -->
    <div class="background"></div>

    <!-- Главный экран -->
    <section class="welcome" id="welcome">
        <div class="overlay"></div>
        <div class="welcome-content">
            <h1>Ты меня любишь? ❤️</h1>
            <div class="buttons">
                <button id="yesBtn">Да ❤️</button>
                <button id="noBtn">Нет 💔</button>
            </div>
        </div>
    </section>

    <!-- Второй экран -->
    <section id="lovePage">
        <h1 class="title">Я тебя тоже люблю ❤️</h1>
        <div class="daysTogether-wrapper">
            <div class="daysTogether">Мы вместе уже <span id="daysCounter"></span></div>
        </div>

        <!-- Фразы с кнопкой -->
        <div class="phrase-section">
            <button class="phrase-btn" id="phraseBtn">💖 Сказать что-то</button>
            <div class="phrase" id="phraseDisplay">Ты самое лучшее, что со мной случилось ❤️</div>
        </div>

        <!-- Галерея -->
        <div class="gallery-container">
            <div class="gallery">
                <div class="slide active">
                    <img src="photo1.jpg" alt="Фото 1">
                </div>
                <div class="slide">
                    <img src="photo2.jpg" alt="Фото 2">
                </div>
                <div class="slide">
                    <img src="photo3.jpg" alt="Фото 3">
                </div>
                <div class="slide">
                    <img src="photo4.jpg" alt="Фото 4">
                </div>
                <div class="slide">
                    <img src="photo5.jpg" alt="Фото 5">
                </div>
                <div class="slide">
                    <img src="photo6.jpg" alt="Фото 6">
                </div>
            </div>
        </div>

        <!-- Конверт -->
        <div class="envelope">💌</div>
        <div class="letter" id="letter">
            <h2>Для тебя ❤️</h2>
            <p>Спасибо, что ты есть. Спасибо за твою улыбку, заботу и за каждый момент рядом. Я люблю тебя всем сердцем ❤️</p>
        </div>

        <!-- Финальный блок -->
        <div class="forever">
            <button id="foreverBtn">Навсегда? 💍</button>
        </div>
    </section>

    <!-- Полноэкранное фото -->
    <div id="photoViewer">
        <span id="closePhoto">✖</span>
        <img id="viewerImage">
    </div>

    <!-- Музыка -->
    <audio id="music" loop>
        <source src="music.mp3" type="audio/mp3">
    </audio>

    <script src="script.js"></script>
</body>
</html>
