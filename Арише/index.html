<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Для тебя ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background: #ffd6e8;
            color: white;
        }

        .background {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #ff9ec9, #ffd6e8, #ffeef6);
            z-index: -5;
        }

        /* ===== ГЛАВНЫЙ ЭКРАН ===== */
        .welcome {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
        }

        .welcome-content {
            z-index: 2;
        }

        .welcome h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            text-shadow: 0 0 25px hotpink;
        }

        .buttons {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            border: none;
            border-radius: 40px;
            padding: 18px 40px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: .4s;
        }

        #yesBtn {
            background: #ff4da6;
            color: white;
            box-shadow: 0 0 25px hotpink;
        }

        #noBtn {
            background: white;
            color: #ff4da6;
        }

        button:hover {
            transform: scale(1.08);
        }

        /* ===== ВТОРАЯ СТРАНИЦА ===== */
        #lovePage {
            display: none;
            padding: 40px 20px 100px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            text-shadow: 0 0 20px hotpink;
        }

        .daysTogether {
            text-align: center;
            margin: 20px 0;
            font-size: 1.3rem;
            color: #4a0024;
            font-weight: 600;
            background: rgba(255, 240, 245, 0.5);
            padding: 10px 20px;
            border-radius: 60px;
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
            width: auto;
            backdrop-filter: blur(5px);
        }

        .daysTogether-wrapper {
            text-align: center;
        }

        /* ===== ФРАЗЫ ===== */
        .phrase-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .phrase-btn {
            background: #ff4da6;
            color: white;
            padding: 14px 32px;
            border-radius: 60px;
            border: none;
            font-size: 1.1rem;
            box-shadow: 0 0 25px hotpink;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .phrase-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px hotpink;
        }

        .phrase {
            font-size: 1.3rem;
            font-weight: 600;
            padding: 16px 30px;
            background: rgba(255, 240, 245, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 60px;
            min-height: 70px;
            display: flex;
            align-items: center;
            text-align: center;
            flex: 1;
            max-width: 550px;
            justify-content: center;
            color: #3d001e;
            border: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 25px rgba(255, 105, 180, 0.2);
            line-height: 1.4;
            text-shadow: 0 1px 4px rgba(255, 255, 255, 0.3);
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== ГАЛЕРЕЯ ===== */
        .gallery-container {
            margin: 20px 0 40px;
        }

        @media (max-width: 768px) {
            .gallery {
                position: relative;
                width: 100%;
                height: 60vh;
                overflow: hidden;
                border-radius: 30px;
                box-shadow: 0 0 40px rgba(255, 105, 180, 0.7);
            }

            .slide {
                display: none;
                width: 100%;
                height: 100%;
            }

            .slide.active {
                display: block;
            }

            .slide img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .phrase {
                font-size: 1rem;
                padding: 14px 20px;
                min-height: 56px;
                white-space: normal;
                max-width: 100%;
                width: 100%;
            }

            .phrase-section {
                flex-direction: column;
                gap: 15px;
            }

            .phrase-btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (min-width: 769px) {
            .gallery {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                padding: 20px;
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                border-radius: 30px;
                box-shadow: 0 0 40px rgba(255, 105, 180, 0.3);
            }

            .slide {
                display: block !important;
                width: 100%;
                height: 280px;
                overflow: hidden;
                border-radius: 20px;
                transition: transform 0.3s, box-shadow 0.3s;
                cursor: pointer;
            }

            .slide:hover {
                transform: scale(1.03);
                box-shadow: 0 0 30px hotpink;
            }

            .slide img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 20px;
            }
        }

        /* ===== КОНВЕРТ (ИСПРАВЛЕННЫЙ) ===== */
        .envelope {
            margin: 40px auto 20px;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            cursor: pointer;
        }

        .letter {
            width: 90%;
            max-width: 500px;
            margin: 0 auto 30px;
            background: rgba(255, 240, 245, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px 28px;
            border-radius: 25px;
            display: none;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.2);
        }

        .letter h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #3d001e;
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
        }

        .letter p {
            line-height: 1.8;
            color: #3d001e;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
        }

        /* ===== МУЗЫКА ===== */
        #musicBtn {
            display: block;
            margin: 30px auto;
            background: #ff4da6;
            color: white;
        }

        /* ===== НАВСЕГДА ===== */
        .forever {
            text-align: center;
            margin-top: 30px;
        }

        #foreverBtn {
            background: white;
            color: #ff4da6;
            box-shadow: 0 0 30px hotpink;
            font-size: 1.2rem;
        }

        /* ===== ПОЛНОЭКРАННЫЙ ПРОСМОТР ===== */
        #photoViewer {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn .5s;
        }

        #viewerImage {
            width: 95%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 25px;
            box-shadow: 0 0 50px hotpink;
        }

        #closePhoto {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1001;
        }

        /* ===== ЛЕТАЮЩИЕ СЕРДЕЧКИ ===== */
        .heart {
            position: fixed;
            width: 30px;
            height: 30px;
            pointer-events: none;
            z-index: 999;
            animation: heartFly linear forwards;
        }

        @keyframes heartFly {
            from {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            to {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ===== ЛЕПЕСТКИ ===== */
        .petal {
            position: fixed;
            width: 15px;
            height: 15px;
            background: #ffb7c5;
            border-radius: 70% 0 70% 0;
            opacity: 0.8;
            pointer-events: none;
            animation: sakuraFall linear forwards;
        }

        @keyframes sakuraFall {
            from {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            to {
                transform: translateY(110vh) translateX(150px) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== ЗВЕЗДЫ ===== */
        .star {
            position: fixed;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.2; }
        }

        /* ===== КОНФЕТТИ ===== */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 3000;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== ФИНАЛЬНОЕ СЕРДЦЕ ===== */
        .finalHeart {
            position: fixed;
            inset: 0;
            background: rgba(255, 182, 193, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 2000;
            animation: fadeIn 1s;
        }

        .finalHeart h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            text-shadow: 0 0 30px hotpink;
        }

        .finalHeart p {
            margin-top: 30px;
            font-size: 1.4rem;
            text-align: center;
            padding: 0 20px;
            color: #3d001e;
        }

        .bigHeart {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 768px) {
            .welcome h1 {
                font-size: 2.7rem;
                padding: 0 15px;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 180px;
            }

            .title {
                font-size: 2.8rem;
                padding: 0 15px;
            }

            .daysTogether {
                font-size: 1rem;
                padding: 8px 16px;
            }

            .letter {
                width: 95%;
                padding: 20px 16px;
            }

            .letter h2 {
                font-size: 1.8rem;
            }

            .letter p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Фон -->
    <div class="background"></div>

    <!-- Главный экран -->
    <section class="welcome" id="welcome">
        <div class="overlay"></div>
        <div class="welcome-content">
            <h1>Ты меня любишь? ❤️</h1>
            <div class="buttons">
                <button id="yesBtn">Да ❤️</button>
                <button id="noBtn">Нет 💔</button>
            </div>
        </div>
    </section>

    <!-- Второй экран -->
    <section id="lovePage">
        <h1 class="title">Я тебя тоже люблю ❤️</h1>
        <div class="daysTogether-wrapper">
            <div class="daysTogether">Мы вместе уже <span id="daysCounter"></span></div>
        </div>

        <!-- Фразы с кнопкой -->
        <div class="phrase-section">
            <button class="phrase-btn" id="phraseBtn">💖 Сказать что-то</button>
            <div class="phrase" id="phraseDisplay">Ты самое лучшее, что со мной случилось ❤️</div>
        </div>

        <!-- Галерея -->
        <div class="gallery-container">
            <div class="gallery">
                <div class="slide active">
                    <img src="photo1.jpg" alt="Фото 1">
                </div>
                <div class="slide">
                    <img src="photo2.jpg" alt="Фото 2">
                </div>
                <div class="slide">
                    <img src="photo3.jpg" alt="Фото 3">
                </div>
                <div class="slide">
                    <img src="photo4.jpg" alt="Фото 4">
                </div>
                <div class="slide">
                    <img src="photo5.jpg" alt="Фото 5">
                </div>
                <div class="slide">
                    <img src="photo6.jpg" alt="Фото 6">
                </div>
            </div>
        </div>

        <!-- Конверт -->
        <div class="envelope">💌</div>
        <div class="letter" id="letter">
            <h2>Для тебя ❤️</h2>
            <p>Спасибо, что ты есть. Спасибо за твою улыбку, заботу и за каждый момент рядом. Я люблю тебя всем сердцем ❤️</p>
        </div>

        <!-- Музыка -->
        <button id="musicBtn">🎵 Наша песня</button>
        <audio id="music" loop>
            <source src="music.mp3" type="audio/mp3">
        </audio>

        <!-- Финальный блок -->
        <div class="forever">
            <button id="foreverBtn">Навсегда? 💍</button>
        </div>
    </section>

    <!-- Полноэкранное фото -->
    <div id="photoViewer">
        <span id="closePhoto">✖</span>
        <img id="viewerImage">
    </div>

    <script>
        // Кнопки
        const yesBtn = document.getElementById("yesBtn");
        const noBtn = document.getElementById("noBtn");
        const welcome = document.querySelector(".welcome");
        const lovePage = document.getElementById("lovePage");

        // Музыка
        const music = document.getElementById("music");
        const musicBtn = document.getElementById("musicBtn");

        // Галерея
        const slides = document.querySelectorAll(".slide");

        // Фразы
        const phraseDisplay = document.getElementById("phraseDisplay");
        const phraseBtn = document.getElementById("phraseBtn");

        // Конверт
        const envelope = document.querySelector(".envelope");
        const letter = document.getElementById("letter");

        // Просмотр фото
        const photoViewer = document.getElementById("photoViewer");
        const viewerImage = document.getElementById("viewerImage");
        const closePhoto = document.getElementById("closePhoto");

        // Кнопка "Навсегда"
        const foreverBtn = document.getElementById("foreverBtn");

        // ===== УБЕГАЮЩАЯ КНОПКА =====
        function moveButton() {
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;

            noBtn.style.position = "fixed";
            noBtn.style.left = Math.random() * maxX + "px";
            noBtn.style.top = Math.random() * maxY + "px";
        }

        noBtn.addEventListener("mouseover", moveButton);
        noBtn.addEventListener("touchstart", (e) => {
            e.preventDefault();
            moveButton();
        });

        // ===== НАЖАЛИ "ДА" =====
        yesBtn.addEventListener("click", () => {
            welcome.style.display = "none";
            lovePage.style.display = "block";
            createHearts();
            music.play().catch(() => {});
        });

        // ===== ФРАЗЫ (ПО ПОРЯДКУ) =====
        const phrases = [
            "Ты самое лучшее, что со мной случилось ❤️",
            "Люблю твою улыбку больше всего на свете 💕",
            "Спасибо, что ты есть в моей жизни ❤️",
            "С тобой каждый день становится счастливым 🌹",
            "Ты моя самая любимая девочка на свете 💖",
            "Я люблю тебя всем сердцем и всей душой ❤️",
            "Ты мой самый родной и близкий человек 🌸",
            "Каждый день с тобой — это настоящий подарок 🎁",
            "Ты делаешь меня самым счастливым человеком 😊",
            "Я безумно сильно тебя люблю 💋",
            "Ты — моё вдохновение и моя радость ✨",
            "С тобой я хочу прожить всю жизнь 💍",
            "Твоя улыбка — это моё солнце ☀️",
            "Ты — моя самая большая ценность 💎",
            "Я выбираю тебя каждый день и навсегда ❤️"
        ];

        let phraseIndex = 0;

        phraseBtn.addEventListener("click", () => {
            phraseDisplay.textContent = phrases[phraseIndex];
            phraseIndex = (phraseIndex + 1) % phrases.length;
        });

        // ===== ГАЛЕРЕЯ (ТОЛЬКО ДЛЯ ТЕЛЕФОНА) =====
        let currentSlide = 0;
        let slideInterval;

        function startSlideshow() {
            if (window.innerWidth <= 768) {
                slides.forEach((slide, index) => {
                    slide.classList.toggle("active", index === 0);
                });
                currentSlide = 0;

                clearInterval(slideInterval);
                slideInterval = setInterval(() => {
                    slides[currentSlide].classList.remove("active");
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add("active");
                }, 4000);
            } else {
                clearInterval(slideInterval);
                slides.forEach(slide => slide.classList.add("active"));
            }
        }

        startSlideshow();
        window.addEventListener("resize", startSlideshow);

        // ===== ПОЛНОЭКРАННОЕ ФОТО =====
        slides.forEach(slide => {
            slide.addEventListener("click", () => {
                if (window.innerWidth > 768) {
                    photoViewer.style.display = "flex";
                    viewerImage.src = slide.querySelector("img").src;
                }
            });
        });

        closePhoto.addEventListener("click", () => {
            photoViewer.style.display = "none";
        });

        // ===== КОНВЕРТ =====
        envelope.addEventListener("click", () => {
            letter.style.display = letter.style.display === "block" ? "none" : "block";
        });

        // ===== МУЗЫКА =====
        musicBtn.addEventListener("click", () => {
            music.play();
        });

        // ===== СЧЕТЧИК ДНЕЙ =====
        const startDate = new Date("2023-11-11");

        function updateDays() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("daysCounter").innerHTML = days + " дней ❤️";
        }
        updateDays();

        // ===== СЕРДЕЧКИ =====
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = `
                <svg viewBox="0 0 32 29" width="30" height="30">
                    <path fill="#ff4da6" d="M23.6,0c-3,0-5.5,1.7-7.6,4.3C13.9,1.7,11.4,0,8.4,0
                    C3.8,0,0,3.8,0,8.4c0,9.3,16,20.6,16,20.6s16-11.3,16-20.6
                    C32,3.8,28.2,0,23.6,0z"/>
                </svg>
            `;
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.bottom = "-50px";
            heart.style.animationDuration = 3 + Math.random() * 4 + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }

        function createHearts() {
            setInterval(createHeart, 200);
        }

        // ===== ЛЕПЕСТКИ САКУРЫ =====
        function createPetal() {
            const petal = document.createElement("div");
            petal.classList.add("petal");
            petal.style.left = Math.random() * 100 + "vw";
            petal.style.animationDuration = 4 + Math.random() * 6 + "s";
            petal.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 10000);
        }
        setInterval(createPetal, 600);

        // ===== ЗВЕЗДЫ =====
        for (let i = 0; i < 100; i++) {
            const star = document.createElement("div");
            star.classList.add("star");
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            star.style.animationDelay = Math.random() * 2 + "s";
            document.body.appendChild(star);
        }

        // ===== КОНФЕТТИ =====
        function createConfetti() {
            const colors = ['#ff4da6', '#ff6b9d', '#ff8cb5', '#ffb3c6', '#ffd6e8', '#ff6f91', '#ff9671', '#ffc75f'];

            for (let i = 0; i < 200; i++) {
                const confetti = document.createElement("div");
                confetti.classList.add("confetti");
                confetti.style.left = Math.random() * 100 + "vw";
                confetti.style.top = "-20px";
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = 6 + Math.random() * 10 + "px";
                confetti.style.height = 6 + Math.random() * 10 + "px";
                confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
                confetti.style.animationDuration = 3 + Math.random() * 4 + "s";
                confetti.style.animationDelay = Math.random() * 2 + "s";
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 6000);
            }
        }

        // ===== НАВСЕГДА =====
        foreverBtn.addEventListener("click", () => {
            createConfetti();

            setTimeout(() => {
                const finalHeart = document.createElement("div");
                finalHeart.classList.add("finalHeart");
                finalHeart.innerHTML = `
                    <h1>❤️</h1>
                    <p>Я люблю тебя ❤️<br>И это только начало нашей истории...<br>∞</p>
                `;
                document.body.appendChild(finalHeart);

                setTimeout(() => {
                    finalHeart.style.transition = "opacity 2s";
                    finalHeart.style.opacity = "0";
                    setTimeout(() => finalHeart.remove(), 2000);
                }, 4000);
            }, 1000);
        });

        // ===== СВАЙПЫ ДЛЯ ГАЛЕРЕИ (ТЕЛЕФОН) =====
        let startX = 0;
        const gallery = document.querySelector(".gallery");

        gallery.addEventListener("touchstart", (e) => {
            startX = e.touches[0].clientX;
        });

        gallery.addEventListener("touchend", (e) => {
            if (window.innerWidth <= 768) {
                const endX = e.changedTouches[0].clientX;
                const diff = startX - endX;

                if (Math.abs(diff) > 50) {
                    slides[currentSlide].classList.remove("active");
                    if (diff > 0) {
                        currentSlide = (currentSlide + 1) % slides.length;
                    } else {
                        currentSlide = (currentSlide - 1 + slides.length) % slides.length;
                    }
                    slides[currentSlide].classList.add("active");
                }
            }
        });

        // ===== МЕРЦАЮЩИЕ ЧАСТИЦЫ =====
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement("div");
            particle.style.position = "fixed";
            particle.style.width = "4px";
            particle.style.height = "4px";
            particle.style.borderRadius = "50%";
            particle.style.background = "white";
            particle.style.opacity = "0.6";
            particle.style.left = Math.random() * 100 + "vw";
            particle.style.top = Math.random() * 100 + "vh";
            particle.style.animation = "blink 2s infinite";
            particle.style.animationDelay = Math.random() * 2 + "s";
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
